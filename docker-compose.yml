services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geo_lens
      POSTGRES_PASSWORD: geo_lens_password
      POSTGRES_DB: geo_lens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo_lens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
